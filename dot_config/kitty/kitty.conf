## ~/.config/kitty/kitty.conf

# Evita el popup "¿cerrar esta ventana?" cuando hay un proceso
# (como btop) corriendo en primer plano.
confirm_os_window_close 0

font_family JetBrainsMono Nerd Font
font_size 11.0
#background_opacity 0.92
background_opacity 0.8

#####################
### COLORES — estilo "techy" (verde neón sobre negro)
#####################
# 1984 theme by Bertie Blackman, https://github.com/covertbert/iterm2-1984/

foreground #ffffff
background #0d0f31
selection_foreground #000000
selection_background #00d5eb
color0 #000000
color1 #ff16b0
color2 #b3f361
color3 #ffea16
color4 #46bdff
color5 #f806fa
color6 #59e1e3
color7 #feffff
color8 #000000
color9 #ff16b0
color10 #b3f361
color11 #ffea16
color12 #46bdff
color13 #f806fa
color14 #6be4e6
color15 #feffff

# URL styles
url_color #f806fa
url_style single

# Cursor styles
cursor #59e1e3

# START_AUTOGENERATED_TAB_STYLE
# Feel free to update these colors manually and remove these comments.
active_tab_foreground   #eeeeee
active_tab_background   #00d5eb
inactive_tab_foreground #ffffff
inactive_tab_background #0a0c27
# END_AUTOGENERATED_TAB_STYLE